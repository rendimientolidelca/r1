    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <!-- Animaciones y estilos personalizados -->
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        
        /* Animación sin transform para no romper los modales fixed */
        @keyframes opacityFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-opacity {
            animation: opacityFade 0.4s ease-out forwards;
        }

        /* Nuevas animaciones elegantes para el portal */
        @keyframes scaleFadeIn {
            0% { opacity: 0; transform: scale(0.85) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-scale-fade { 
            animation: scaleFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        
        @keyframes slideUpFadeIn {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up-fade { 
            animation: slideUpFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            opacity: 0; 
        }
        /* Delays para efecto cascada en el titulo */
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }

        /* --- ANIMACIONES DE TRANSICIÓN ESPECTACULAR (TIPO FRAMER MOTION) --- */
        .curtain-layer {
            position: fixed;
            inset: 0;
            z-index: 99990;
            transform: translateY(100%);
            will-change: transform;
        }
        .transition-enter .curtain-layer {
            animation: curtainUp 0.8s cubic-bezier(0.85, 0, 0.15, 1) forwards;
        }
        .transition-leave .curtain-layer {
            animation: curtainLeave 0.8s cubic-bezier(0.85, 0, 0.15, 1) forwards;
        }
        @keyframes curtainUp {
            0% { transform: translateY(100%); }
            100% { transform: translateY(0%); }
        }
        @keyframes curtainLeave {
            0% { transform: translateY(0%); }
            100% { transform: translateY(-100%); }
        }

        .curtain-delay-1 { animation-delay: 0s !important; z-index: 99991; }
        .curtain-delay-2 { animation-delay: 0.1s !important; z-index: 99992; }
        .curtain-delay-3 { animation-delay: 0.2s !important; z-index: 99993; }

        .curtain-content {
            position: fixed;
            inset: 0;
            z-index: 99995;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
        }
        .transition-enter .curtain-content {
            animation: contentFadeIn 0.5s ease-out 0.5s forwards;
        }
        .transition-leave .curtain-content {
            animation: contentFadeOut 0.4s ease-in forwards;
        }
        @keyframes contentFadeIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes contentFadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .custom-table-container {
            scrollbar-gutter: stable;
        }
        @keyframes soft-blink {
            0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 15px 2px currentColor; }
            50% { opacity: 0.3; transform: scale(0.85); box-shadow: 0 0 2px 0px currentColor; }
        }
        .animate-soft-blink {
            animation: soft-blink 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes avatarReveal {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes flash-in {
            0% { transform: scale(0.8) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        @keyframes flash-out {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.1) translateY(-10px); opacity: 0; }
        }
        .student-enter {
            animation: flash-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .student-leave {
            animation: flash-out 0.5s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards;
        }
    </style>
</head>

              averages[prop] = sum / currentData.length;

                 combinedAvg = ((student.intermedio || 0) + (student.final || 0)) / 2;

                 combinedAvg = ((student.quiz || 0) + (student.intermedio || 0) + (student.final || 0)) / 3;

            });
            
            const percentage = total > 0 ? Math.round((countPositive / total) * 100) : 0;
            const negativeCount = total - countPositive;

            const delays = [1000, 2000, 4000, 8000, 16000];

              try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
              } catch (error) {
                if (i === retries - 1) throw error;
                await new Promise(resolve => setTimeout(resolve, delays[i]));

                    const apiKey = "";

              const createPolygon = (pts) => `M ${pts.map(p => `${p.x},${p.y}`).join(' L ')} Z`;

                              <p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest">DOCUMENTO OFICIAL GENERADO AUTOMÁTICAMENTE | LICEO DEL CARIBE</p>
                          </div>
                      </div>

                  </div>

              genericModalList = alertaStudents;
              genericModalTitle = "Alerta Temprana";
          } else if (criterionModalData) {
              genericModalList = sortedAllStudents;
              genericModalTitle = `Rendimiento: ${criterionModalData.label}`;
              genericValExtractor = (s) => getStudentValue(s, criterionModalData);

          const filteredGenericList = genericModalList.filter(s => s.name.toLowerCase().includes(modalSearchTerm.toLowerCase()));

          return (
            <>

                            <h4 className="font-bold text-gray-700 mb-6 flex items-center gap-2"><IconBarChart2 size={18}/> Desglose de Notas</h4>
                            <div className="space-y-5">
                              {config.items.map((item, idx) => {
                                const val = getStudentValue(selectedStudent, item);
                                const avg = getClassAverageValue(item);
                                return (
                                  <div key={idx} className="relative">
                                    <div className="flex mb-1.5 items-center justify-between">
                                      <span className="text-xs font-bold inline-block text-gray-600 uppercase tracking-wide">{item.label}</span>
                                      <span className={`text-sm font-black inline-block`} style={{ color: getColorByValue(val) }}>
                                        {val.toFixed(1)} <span className="text-gray-400 font-bold text-xs">/ 5.0</span>
                                      </span>
                                    </div>
                                    <div className="overflow-hidden h-2.5 mb-1.5 text-xs flex rounded-full bg-gray-100">
                                      <div style={{ width: `${(val / 5) * 100}%`, backgroundColor: getColorByValue(val) }} className="shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center transition-all duration-500 rounded-full"></div>
                                    </div>
                                    <p className="text-[10px] text-gray-500 font-medium flex justify-between">
                                      <span>Promedio del grupo</span>
                                      <span>{avg.toFixed(2)}</span>
                                    </p>
                                  </div>
                                );
                              })}
                            </div>
                          </div>

                          <div className="bg-white rounded-3xl border border-gray-200 shadow-sm overflow-hidden h-full flex flex-col">
                            <div className="bg-gray-50 p-5 border-b border-gray-200">
                                <h4 className="font-bold text-gray-700 text-sm flex items-center gap-2">
                                  <IconTrendingUp size={18} className="text-blue-500" /> Comparativa Numérica Detallada
                                </h4>
                            </div>
                            <div className="overflow-x-auto p-2 flex-1">
                              <table className="w-full text-xs text-left bg-white h-full">
                                <thead className="bg-white text-gray-500 border-b border-gray-100">
                                  <tr>
                                    <th className="py-3 px-4 font-semibold uppercase tracking-wider">Criterio</th>
                                    <th className="py-3 px-4 font-semibold text-center uppercase tracking-wider">Ind.</th>
                                    <th className="py-3 px-4 font-semibold text-center uppercase tracking-wider">Curso</th>
                                    <th className="py-3 px-4 font-semibold text-center uppercase tracking-wider">Brecha</th>
                                  </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-50">
                                  {config.items.map((item, idx) => {
                                    const val = getStudentValue(selectedStudent, item);
                                    const avg = getClassAverageValue(item);
                                    const diff = (val - avg).toFixed(1);
                                    const isPositive = diff > 0;
                                    const isNeutral = diff == 0;
                                    return (
                                      <tr key={idx} className="hover:bg-blue-50/50 transition-colors">
                                        <td className="py-3 px-4 font-bold text-gray-700 uppercase tracking-tighter">{item.label.split(' ')[0]}</td>
                                        <td className="py-3 px-4 text-center font-black text-sm" style={{ color: getColorByValue(val) }}>{val.toFixed(1)}</td>
                                        <td className="py-3 px-4 text-center font-bold text-gray-400 text-sm">{avg.toFixed(1)}</td>
                                        <td className="py-3 px-4 text-center font-bold">
                                          <span className={`px-2.5 py-1 rounded-full text-[11px] ${isPositive ? 'bg-green-100 text-green-700 border border-green-200' : isNeutral ? 'bg-gray-100 text-gray-500 border border-gray-200' : 'bg-red-100 text-red-700 border border-red-200'}`}>
                                            {isPositive ? '+' : ''}{diff}
                                          </span>
                                        </td>
                                      </tr>
                                    );
                                  })}
                                </tbody>
                              </table>
                            </div>
                          </div>

                        </div>

                        <div className="bg-white p-6 md:p-8 rounded-3xl border border-gray-200 shadow-sm">
                          <h4 className="font-bold text-gray-700 mb-6 flex items-center gap-2 text-lg"><IconTarget size={20} className="text-indigo-500"/> Huella de Rendimiento Radial</h4>
                          
                          <div className="flex gap-6 mb-8 justify-center text-sm font-medium">
                            <span className="flex items-center gap-2"><span className="w-4 h-4 bg-blue-600/30 border-2 border-blue-600 rounded"></span> {selectedStudent.name}</span>
                            <span className="flex items-center gap-2"><span className="w-4 h-4 bg-gray-200 border-2 border-gray-400 rounded border-dashed"></span> Promedio del Grupo</span>
                          </div>

                          <div className="w-full max-w-[400px] mx-auto aspect-square relative flex items-center justify-center mb-8">
                             {(() => {
                                const rSize = 400, rCx = 200, rCy = 200, rRadius = 130, rMaxV = 5.0;
                                const rLabels = config.items.map(item => item.label);
                                const rStudentVals = config.items.map(item => getStudentValue(selectedStudent, item));
                                const rAvgVals = config.items.map(item => getClassAverageValue(item));
                                const getRPoint = (val, i, total) => {
                                    const angle = (Math.PI * 2 * i / total) - (Math.PI / 2);
                                    const r = (val / rMaxV) * rRadius;
                                    return { x: rCx + r * Math.cos(angle), y: rCy + r * Math.sin(angle), angle: angle, val: val.toFixed(1) };
                                };
                                const createPolygon = (pts) => `M ${pts.map(p => `${p.x},${p.y}`).join(' L ')} Z`;
                                const rStudentPoints = rStudentVals.map((v, i) => getRPoint(v, i, rLabels.length));
                                const rAvgPoints = rAvgVals.map((v, i) => getRPoint(v, i, rLabels.length));
                                return (
                                    <svg viewBox="0 0 400 400" className="w-full h-full overflow-visible">
                                        {[1, 2, 3, 4, 5].map(level => (
                                            <g key={`grid-ui-${level}`}>
                                                <path d={createPolygon(rLabels.map((_, i) => getRPoint(level, i, rLabels.length)))} fill="none" stroke="#e5e7eb" strokeWidth="1" />
                                                <text x={rCx} y={rCy - ((level/rMaxV) * rRadius) - 4} fontSize="9" fill="#9ca3af" textAnchor="end">{level}.0</text>
                                            </g>
                                        ))}
                                        {rLabels.map((lbl, i) => {
                                            const endPt = getRPoint(5, i, rLabels.length);
                                            return (
                                                <g key={`axis-ui-${i}`}>
                                                    <line x1={rCx} y1={rCy} x2={endPt.x} y2={endPt.y} stroke="#e5e7eb" strokeWidth="1.5" />
                                                    <text x={rCx + (rRadius+25)*Math.cos(endPt.angle)} y={rCy + (rRadius+25)*Math.sin(endPt.angle) + 4} fontSize="10" fill="#4b5563" fontWeight="bold" textAnchor="middle">{lbl.split(' ')[0]}</text>
                                                </g>
                                            );
                                        })}
                                        <path d={createPolygon(rAvgPoints)} fill="rgba(156, 163, 175, 0.15)" stroke="#9ca3af" strokeWidth="2" strokeDasharray="4 4" />
                                        <path d={createPolygon(rStudentPoints)} fill="rgba(37, 99, 235, 0.25)" stroke="#2563eb" strokeWidth="2" />
                                        {rStudentPoints.map((p, i) => <circle key={`sp-ui-${i}`} cx={p.x} cy={p.y} r="4" fill="#2563eb" stroke="#fff" strokeWidth="1"/>)}
                                        {rAvgPoints.map((p, i) => <circle key={`ap-ui-${i}`} cx={p.x} cy={p.y} r="3" fill="#fff" stroke="#9ca3af" strokeWidth="1"/>)}
                                    </svg>
                                );
                             })()}
                          </div>
                          
                          {/* LECTURA DE DATOS RADIAL EN LA UI */}
                          {(() => {
                              const criteria = config.items.map(item => ({
                                  name: item.label.split(' ')[0],
                                  val: getStudentValue(selectedStudent, item),
                                  avg: getClassAverageValue(item)
                              })).sort((a, b) => b.val - a.val);
                              const strongest = criteria[0];
                              const weakest = criteria[criteria.length - 1];
                              const diffStrong = (strongest.val - strongest.avg).toFixed(1);
                              const diffWeak = (weakest.val - weakest.avg).toFixed(1);
                              const strongText = diffStrong >= 0 ? `(+${diffStrong} respecto al promedio grupal)` : `(${diffStrong} respecto al promedio grupal)`;
                              const weakText = diffWeak >= 0 ? `(+${diffWeak} respecto al promedio grupal)` : `(${diffWeak} respecto al promedio grupal)`;

                              return (
                                  <div className="bg-gray-50 p-5 border border-gray-200 rounded-xl">
                                      <h4 className="font-bold text-gray-800 uppercase text-[12px] mb-3 tracking-wider border-b border-gray-200 pb-2">Interpretación de Datos Radial</h4>
                                      <div className="text-sm text-gray-700 leading-relaxed space-y-3 font-medium">
                                          <p>El gráfico radial describe numéricamente la distribución de las calificaciones de <strong>{selectedStudent.name}</strong>. El valor máximo en su rendimiento corresponde a <strong className="text-blue-700">{strongest.name}</strong> con una nota de <strong>{strongest.val.toFixed(1)}</strong> <span className="text-gray-500 text-xs">{strongText}</span>. En el extremo opuesto, el valor mínimo se registra en <strong className="text-red-700">{weakest.name}</strong> con una nota de <strong>{weakest.val.toFixed(1)}</strong> <span className="text-gray-500 text-xs">{weakText}</span>.</p>
                                          <p className="border-l-4 border-blue-500 pl-3 bg-blue-50/50 py-2 rounded-r-md"><strong>Análisis general:</strong> Con un promedio final de {selectedStudent.promedio.toFixed(2)}, los datos indican un desempeño {selectedStudent.promedio >= 4.0 ? 'Alto/Superior. Las variables analizadas superan la media del curso en su mayoría, evidenciando consistencia en los criterios de evaluación.' : selectedStudent.promedio >= 3.0 ? 'Básico. El estudiante cumple con los requisitos de aprobación, pero se identifica una desviación negativa importante en sus métricas más bajas que requiere nivelación.' : 'Bajo. Las métricas graficadas presentan una contracción generalizada respecto al promedio del grupo, confirmando deficiencias en múltiples criterios de evaluación.'}</p>
                                      </div>
                                  </div>
                              );
                          })()}
                        </div>

                        <div className="bg-white p-6 md:p-8 rounded-3xl border border-gray-200 shadow-sm flex flex-col justify-center items-center text-center">
                            <IconBrainCircuit size={48} className="text-red-700 mb-4" />
                            <h4 className="font-bold text-gray-800 text-xl mb-2">Herramientas y Acciones</h4>
                            <p className="text-sm text-gray-500 mb-6 max-w-md">Accede al reporte oficial generado por la IA, envía retroalimentación a la familia o consulta el observador.</p>
                            
                            <div className="flex flex-wrap justify-center gap-4 w-full">
                                <button 
                                    onClick={() => setIsPdfPasswordModalOpen(true)} 
                                    disabled={loadingPDF}
                                    className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold text-white shadow-lg transition-all ${loadingPDF ? 'bg-gray-400 cursor-not-allowed' : 'bg-red-700 hover:bg-red-800 hover:shadow-xl hover:-translate-y-1'}`}
                                >
                                    <IconPrinter size={20} />
                                    {loadingPDF ? 'Generando PDF...' : 'Generar PDF Oficial'}
                                </button>
                                <button className="flex items-center gap-2 px-6 py-3 rounded-xl font-bold text-gray-700 bg-white border border-gray-300 shadow-sm hover:bg-blue-50 hover:text-blue-700 hover:border-blue-200 hover:shadow-md transition-all">
                                    <IconMail size={20} className="text-blue-500"/> Correo a Padres
                                </button>
                                <button className="flex items-center gap-2 px-6 py-3 rounded-xl font-bold text-gray-700 bg-white border border-gray-300 shadow-sm hover:bg-emerald-50 hover:text-emerald-700 hover:border-emerald-200 hover:shadow-md transition-all">
                                    <IconClipboard size={20} className="text-emerald-500"/> Observador
                                </button>
                            </div>
                            
                            {aiResults.error && <p className="text-red-500 mt-4 text-sm font-bold">{aiResults.error}</p>}
                        </div>

                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* Renderizar Plantilla de Impresión de Fondo */}
              {renderPrintTemplate()}

              {/* Modal de Contraseña para PDF */}
              {isPdfPasswordModalOpen && (
                <div className="fixed inset-0 z-[3000] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 animate-opacity" onClick={(e) => e.stopPropagation()}>
                  <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden border-t-4 border-red-700 animate-slide-up-fade" onClick={e => e.stopPropagation()}>
                    <div className="bg-white text-gray-800 p-5 flex justify-between items-center border-b border-gray-100">
                      <h3 className="font-bold flex items-center gap-2"><IconLock size={20} className="text-red-600" /> Seguridad de Reporte</h3>
                      <button onClick={() => {setIsPdfPasswordModalOpen(false); setPdfPasswordError(false); setPdfPasswordInput('');}} className="text-gray-400 hover:text-red-600 transition-colors"><IconX size={20} /></button>
                    </div>
                    <form onSubmit={(e) => {
                        e.preventDefault();
                        if (pdfPasswordInput === 'Lidelca') {
                            setIsPdfPasswordModalOpen(false);
                            setPdfPasswordInput('');
                            setPdfPasswordError(false);
                            handlePrintPDF();
                        } else {
                            setPdfPasswordError(true);
                        }
                    }} className="p-6">
                      <p className="text-gray-600 text-sm mb-4">Ingrese la clave de administrador para generar el PDF oficial.</p>
                      <div className="mb-4">
                        <input 
                          type="password" 
                          placeholder="Contraseña" 
                          className={`w-full p-3 border-2 rounded-lg focus:outline-none focus:ring-4 transition-all ${pdfPasswordError ? 'border-red-500 focus:ring-red-100' : 'border-gray-200 focus:border-red-500 focus:ring-red-100'}`}
                          value={pdfPasswordInput}
                          onChange={(e) => setPdfPasswordInput(e.target.value)}
                          autoFocus
                        />
                        {pdfPasswordError && <p className="text-red-500 text-xs mt-2 font-bold animate-opacity">Contraseña incorrecta. Intente nuevamente.</p>}
                      </div>
                      <div className="flex gap-3 justify-end mt-6">
                        <button type="button" onClick={() => {setIsPdfPasswordModalOpen(false); setPdfPasswordError(false); setPdfPasswordInput('');}} className="px-4 py-2 rounded-lg font-bold text-gray-500 bg-gray-100 hover:bg-gray-200 transition-colors text-sm">Cancelar</button>
                        <button type="submit" className="px-4 py-2 rounded-lg font-bold text-white bg-red-700 hover:bg-red-800 shadow-md transition-colors text-sm">Validar y Generar</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {/* Modales Genéricos de Datos Rápidos (Con Buscador) */}
              {(isListModalOpen || isReprobadosModalOpen || isAlertaModalOpen || criterionModalData) && (
                  <div className="fixed inset-0 z-[1500] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 animate-opacity" onClick={() => { setIsListModalOpen(false); setIsReprobadosModalOpen(false); setIsAlertaModalOpen(false); setCriterionModalData(null); setModalSearchTerm(''); }}>
                      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg flex flex-col max-h-[85vh] overflow-hidden" onClick={e=>e.stopPropagation()}>
                          
                          <div className="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                              <h3 className="font-black text-lg text-gray-800 uppercase tracking-tight flex items-center gap-2 border-l-4 border-red-600 pl-3">
                                  {genericModalTitle}
                                  <span className="bg-gray-200 text-gray-600 text-xs px-2 py-0.5 rounded-full ml-1">{genericModalList.length}</span>
                              </h3>
                              <button className="text-gray-400 hover:text-red-600 hover:bg-red-50 p-1.5 rounded-full transition-colors" onClick={() => { setIsListModalOpen(false); setIsReprobadosModalOpen(false); setIsAlertaModalOpen(false); setCriterionModalData(null); setModalSearchTerm(''); }}><IconX size={20}/></button>
                          </div>
                          
                          <div className="p-4 border-b border-gray-100 bg-white shrink-0">
                              <div className="relative">
                                  <input 
                                    type="text" 
                                    placeholder="Buscar estudiante..." 
                                    value={modalSearchTerm} 
                                    onChange={e => setModalSearchTerm(e.target.value)} 
                                    className="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-300 text-sm focus:ring-red-500 focus:border-red-500 outline-none transition-shadow shadow-sm bg-gray-50" 
                                  />
                                  <IconSearch size={18} className="absolute left-3.5 top-3 text-gray-400" />
                              </div>
                          </div>

                          <div className="flex justify-between text-xs font-black text-gray-500 uppercase bg-gray-100/80 px-6 py-2.5 shrink-0 border-b border-gray-200">
                              <span>Nombres de Estudiantes</span>
                              <span>Nota</span>
                          </div>

                          <div className="overflow-y-auto flex-1 p-2 custom-table-container">
                             {filteredGenericList.length > 0 ? filteredGenericList.map(s => {
                                 const val = genericValExtractor(s);
                                 return (
                                     <div key={s.id} className="px-4 py-3 mx-2 my-1 rounded-lg border border-transparent hover:border-gray-200 flex justify-between items-center hover:bg-gray-50 cursor-pointer transition-all group" onClick={() => selectStudentAndExpand(s.id, s.name)}>
                                         <span className="font-semibold text-gray-700 text-sm group-hover:text-red-800 transition-colors">{s.name}</span>
                                         <span className="font-black text-sm px-2.5 py-1 rounded-md" style={{backgroundColor: `${getColorByValue(val)}20`, color: getColorByValue(val)}}>
                                            {val.toFixed(2)}
                                         </span>
                                     </div>
                                 )
                             }) : (
                                 <div className="py-12 text-center text-gray-400 flex flex-col items-center">
                                     <IconSearch size={40} className="mb-3 opacity-20" />
                                     <p className="text-sm font-medium">No se encontraron estudiantes.</p>
                                 </div>
                             )}
                          </div>

                      </div>
                  </div>
              )}

            </div>
            {curtainJSX}
            {studentTransitionJSX}
            </>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
